services:
  echoline:
    extends:
      file: compose.yaml
      service: echoline
    image: ghcr.io/vowel/echoline:latest-cpu
    build:
      args:
        BASE_IMAGE: ubuntu:24.04
    volumes:
      - hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
volumes:
  hf-hub-cache:
