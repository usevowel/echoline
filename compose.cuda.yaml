# include:
#   - compose.observability.yaml
services:
  echoline:
    extends:
      file: compose.yaml
      service: echoline
    image: echoline-echoline:latest
    build:
      args:
        BASE_IMAGE: nvidia/cuda:12.9.1-cudnn-runtime-ubuntu24.04
    volumes:
      - hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
volumes:
  hf-hub-cache:
